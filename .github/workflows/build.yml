name: Build APK with Colorize

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install tools
        run: sudo apt-get update -q && sudo apt-get install -y cmake ninja-build unzip wget

      - name: Setup ncnn and OpenCV
        run: |
          wget -q https://github.com/Tencent/ncnn/releases/download/20230816/ncnn-20230816-android.zip
          unzip -q ncnn-20230816-android.zip
          mkdir -p 3rdparty/ncnn-android-vulkan-shared
          cp -r ncnn-20230816-android/* 3rdparty/ncnn-android-vulkan-shared/
          wget -q https://github.com/opencv/opencv/releases/download/4.6.0/opencv-4.6.0-android-sdk.zip
          unzip -q opencv-4.6.0-android-sdk.zip
          echo "ncnn:" && find 3rdparty/ncnn-android-vulkan-shared -name "ncnnConfig.cmake"

      - name: Generate and build colorize-ncnn
        run: |
          NCNN_DIR=$(find 3rdparty/ncnn-android-vulkan-shared -name 'ncnnConfig.cmake' | grep arm64 | head -1 | xargs dirname)
          OPENCV_DIR=$(find OpenCV-android-sdk -name 'OpenCVConfig.cmake' | grep arm64 | head -1 | xargs dirname)
          echo "NCNN=$NCNN_DIR OPENCV=$OPENCV_DIR"
          python3 colorize-gen.py "$NCNN_DIR" "$OPENCV_DIR"
          mkdir -p colorize-build
          cmake -S colorize-src -B colorize-build \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DANDROID_STL=c++_static \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja
          cmake --build colorize-build -j$(nproc)
          ls -lh colorize-build/colorize-ncnn
          echo "colorize-ncnn built ✓"

      - name: Copy binary and model to assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ASSETS=RealSR-NCNN-Android-GUI/app/src/main/assets/realsr
          mkdir -p "$ASSETS/colorize-models"
          cp colorize-build/colorize-ncnn "$ASSETS/colorize-ncnn"

          # Download siggraph17 model from pictureupgrader release
          # (already uploaded there previously)
          MODEL_REPO="riseky8876/pictureupgrader"
          TAG=$(gh release list --repo "$MODEL_REPO" --limit 5 \
                --json tagName --jq '.[].tagName' | head -5 | while read t; do
            if gh release view "$t" --repo "$MODEL_REPO" > /dev/null 2>&1; then
              echo "$t"; break
            fi
          done)
          echo "Using tag: $TAG from $MODEL_REPO"

          gh release download "$TAG" \
            --repo "$MODEL_REPO" \
            --pattern "siggraph17_color_sim.*" \
            --dir "$ASSETS/colorize-models" \
            --clobber

          echo "=== Model files ==="
          ls -lh "$ASSETS/colorize-models/"

          size=$(stat -c%s "$ASSETS/colorize-models/siggraph17_color_sim.bin" 2>/dev/null || echo 0)
          [ "$size" -lt 1000000 ] && echo "ERROR: model too small ($size bytes)" && exit 1
          echo "Assets ready ✓"

      - name: Setup realsr 3rdparty
        run: |
          mkdir -p 3rdparty/ncnn-android-vulkan-shared
          cp -r ncnn-20230816-android/* 3rdparty/ncnn-android-vulkan-shared/ 2>/dev/null || true

      - name: Build APK
        run: |
          cd RealSR-NCNN-Android-GUI
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -x test
          find . -name "*.apk" | xargs ls -lh

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RealSR-Colorize
          path: RealSR-NCNN-Android-GUI/app/build/outputs/apk/**/*.apk

      - name: Create Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Build #${{ github.run_number }} — RealSR + Colorize"
          files: RealSR-NCNN-Android-GUI/app/build/outputs/apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
