name: Build APK with Colorize

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install tools
        run: sudo apt-get update -q && sudo apt-get install -y cmake ninja-build unzip wget

      - name: Setup ncnn and OpenCV
        run: |
          wget -q https://github.com/Tencent/ncnn/releases/download/20230816/ncnn-20230816-android-vulkan.zip
          unzip -q ncnn-20230816-android-vulkan.zip
          # Copy to where the project expects it
          mkdir -p 3rdparty/ncnn-android-vulkan-shared
          cp -r ncnn-20230816-android-vulkan/* 3rdparty/ncnn-android-vulkan-shared/

          wget -q https://github.com/opencv/opencv/releases/download/4.6.0/opencv-4.6.0-android-sdk.zip
          unzip -q opencv-4.6.0-android-sdk.zip

          echo "=== ncnn structure ==="
          find 3rdparty/ncnn-android-vulkan-shared -name "ncnnConfig.cmake" | sort
          echo "=== opencv structure ==="
          find OpenCV-android-sdk -name "OpenCVConfig.cmake" | sort

      - name: Generate and build colorize-ncnn
        run: |
          python3 colorize-gen.py \
            "$(find 3rdparty/ncnn-android-vulkan-shared -name 'ncnnConfig.cmake' | grep arm64 | head -1 | xargs dirname)" \
            "$(find OpenCV-android-sdk -name 'OpenCVConfig.cmake' | head -1 | xargs dirname)"

          mkdir -p colorize-build
          cmake -S colorize-src -B colorize-build \
            -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK/build/cmake/android.toolchain.cmake" \
            -DANDROID_ABI=arm64-v8a \
            -DANDROID_PLATFORM=android-21 \
            -DANDROID_STL=c++_static \
            -DCMAKE_BUILD_TYPE=Release \
            -G Ninja
          cmake --build colorize-build -j$(nproc)
          ls -lh colorize-build/colorize-ncnn
          echo "colorize-ncnn built ✓"

      - name: Copy binary and model to assets
        run: |
          ASSETS=RealSR-NCNN-Android-GUI/app/src/main/assets/realsr
          mkdir -p "$ASSETS/colorize-models"
          cp colorize-build/colorize-ncnn "$ASSETS/colorize-ncnn"
          wget -q --tries=3 "https://github.com/nihui/ncnn-assets/raw/master/models/siggraph17_color_sim.param" -O "$ASSETS/colorize-models/siggraph17_color_sim.param"
          wget -q --tries=3 "https://github.com/nihui/ncnn-assets/raw/master/models/siggraph17_color_sim.bin" -O "$ASSETS/colorize-models/siggraph17_color_sim.bin"
          ls -lh "$ASSETS/colorize-models/"
          size=$(stat -c%s "$ASSETS/colorize-models/siggraph17_color_sim.bin")
          [ "$size" -lt 1000000 ] && echo "ERROR: model too small" && exit 1
          echo "Assets ready ✓"

      - name: Build APK
        run: |
          cd RealSR-NCNN-Android-GUI
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -x test
          find . -name "*.apk" | xargs ls -lh

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RealSR-Colorize
          path: RealSR-NCNN-Android-GUI/app/build/outputs/apk/**/*.apk

      - name: Create Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Build #${{ github.run_number }} — RealSR + Colorize"
          files: RealSR-NCNN-Android-GUI/app/build/outputs/apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
