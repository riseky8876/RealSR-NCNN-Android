name: Build APK with Colorize

on:
  push:
    branches: [ "master", "main" ]
  pull_request:
    branches: [ "master", "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install tools
        run: sudo apt-get update -q && sudo apt-get install -y cmake ninja-build unzip wget

      - name: Setup ncnn and OpenCV
        run: |
          wget -q https://github.com/Tencent/ncnn/releases/download/20230816/ncnn-20230816-android-vulkan.zip
          unzip -q ncnn-20230816-android-vulkan.zip
          wget -q https://github.com/opencv/opencv/releases/download/4.6.0/opencv-4.6.0-android-sdk.zip
          unzip -q opencv-4.6.0-android-sdk.zip

          echo "=== ncnn cmake files ==="
          find ncnn-20230816-android-vulkan -name "*.cmake" | sort
          echo "=== OpenCV cmake files ==="
          find OpenCV-android-sdk -name "*.cmake" | sort | head -10

      - name: Write and build colorize-ncnn
        run: |
          # Find exact cmake config paths
          NCNN_CMAKE=$(find ncnn-20230816-android-vulkan -name "ncnnConfig.cmake" | grep "arm64-v8a" | head -1)
          if [ -z "$NCNN_CMAKE" ]; then
            NCNN_CMAKE=$(find ncnn-20230816-android-vulkan -name "ncnnConfig.cmake" | head -1)
          fi
          NCNN_DIR=$(dirname "$NCNN_CMAKE")

          OPENCV_CMAKE=$(find OpenCV-android-sdk -name "OpenCVConfig.cmake" | head -1)
          OPENCV_DIR=$(dirname "$OPENCV_CMAKE")

          echo "NCNN_DIR=$NCNN_DIR"
          echo "OPENCV_DIR=$OPENCV_DIR"

          mkdir -p colorize-src

          python3 - "$NCNN_DIR" "$OPENCV_DIR" << 'PYEOF'
import sys
ncnn_dir = sys.argv[1]
opencv_dir = sys.argv[2]

cmake = f"""cmake_minimum_required(VERSION 3.22)
project(colorize-ncnn)
set(CMAKE_CXX_STANDARD 17)
set(ncnn_DIR "{ncnn_dir}")
set(OpenCV_DIR "{opencv_dir}")
find_package(ncnn REQUIRED)
find_package(OpenCV REQUIRED core imgproc imgcodecs)
set(CMAKE_CXX_FLAGS "${{CMAKE_CXX_FLAGS}} -fexceptions -fopenmp -Os -fvisibility=hidden")
if(DEFINED ANDROID_NDK_MAJOR AND ${{ANDROID_NDK_MAJOR}} GREATER 20)
    set(CMAKE_EXE_LINKER_FLAGS "${{CMAKE_EXE_LINKER_FLAGS}} -static-openmp")
endif()
add_executable(colorize-ncnn main.cpp colorize_impl.cpp)
set_source_files_properties(colorize_impl.cpp PROPERTIES COMPILE_FLAGS "-fno-rtti")
target_link_libraries(colorize-ncnn ncnn ${{OpenCV_LIBS}})
"""

impl = r"""#include <cstdio>
#include <cstring>
#include <string>
#include <net.h>
#include <layer.h>
class Sig17Slice : public ncnn::Layer {
public:
    Sig17Slice() { one_blob_only = true; }
    int forward(const ncnn::Mat& b, ncnn::Mat& t, const ncnn::Option& opt) const override {
        int w=b.w,h=b.h,c=b.c,ow=w/2,oh=h/2;
        t.create(ow,oh,c,4u,1,opt.blob_allocator);
        if(t.empty())return -100;
        for(int p=0;p<c;p++){
            const float* ptr=b.channel(p%c).row((p/c)%2)+((p/c)/2);
            float* o=t.channel(p);
            for(int i=0;i<oh;i++){for(int j=0;j<ow;j++){*o++=*ptr;ptr+=2;}ptr+=w;}
        }
        return 0;
    }
};
DEFINE_LAYER_CREATOR(Sig17Slice)
extern "C" int colorize_run(const float* L256, float* ab_out, const char* model_dir) {
    ncnn::Net net;
    net.opt.use_vulkan_compute=false;
    net.opt.num_threads=2;
    net.register_custom_layer("Sig17Slice",Sig17Slice_layer_creator);
    std::string mp(model_dir);
    if(net.load_param((mp+"/siggraph17_color_sim.param").c_str()))return -1;
    if(net.load_model((mp+"/siggraph17_color_sim.bin").c_str()))return -1;
    ncnn::Mat in(256,256,1,(void*)L256); in=in.clone();
    ncnn::Extractor ex=net.create_extractor();
    ex.input("input",in); ncnn::Mat out; ex.extract("out_ab",out);
    if(out.empty())return -2;
    int n=out.w*out.h;
    memcpy(ab_out,out.data,n*sizeof(float));
    memcpy(ab_out+n,(float*)out.data+n,n*sizeof(float));
    ab_out[n*2]=(float)out.w; ab_out[n*2+1]=(float)out.h;
    return 0;
}
"""

main = r"""#include <cstdio>
#include <cstring>
#include <string>
#include <vector>
#include <opencv2/opencv.hpp>
extern "C" int colorize_run(const float* L256, float* ab_out, const char* model_dir);
int main(int argc, char** argv) {
    std::string input,output,model_dir; bool verbose=false;
    for(int i=1;i<argc;i++){
        if(!strcmp(argv[i],"-i")&&i+1<argc)input=argv[++i];
        else if(!strcmp(argv[i],"-o")&&i+1<argc)output=argv[++i];
        else if(!strcmp(argv[i],"-m")&&i+1<argc)model_dir=argv[++i];
        else if(!strcmp(argv[i],"-v"))verbose=true;
    }
    if(input.empty()||output.empty()||model_dir.empty()){
        fprintf(stderr,"Usage: colorize-ncnn -i input -o output -m model_dir\n");return 1;}
    cv::Mat bgr=cv::imread(input,cv::IMREAD_COLOR);
    if(bgr.empty()){fprintf(stderr,"failed to read input\n");return 1;}
    cv::Mat base; bgr.convertTo(base,CV_32F,1.0/255.0);
    cv::Mat lab; cvtColor(base,lab,cv::COLOR_BGR2Lab);
    cv::Mat L; cv::extractChannel(lab,L,0);
    cv::Mat L256; cv::resize(L,L256,cv::Size(256,256));
    const int MAX=256*256;
    std::vector<float> ab(MAX*2+2,0.f);
    int ret=colorize_run((const float*)L256.data,ab.data(),model_dir.c_str());
    if(ret<0){fprintf(stderr,"inference failed %d\n",ret);return 1;}
    int nw=(int)ab[MAX*2],nh=(int)ab[MAX*2+1],np=nw*nh;
    cv::Mat a(nh,nw,CV_32F,ab.data()),b2(nh,nw,CV_32F,ab.data()+np);
    cv::resize(a,a,bgr.size()); cv::resize(b2,b2,bgr.size());
    cv::Mat chn[]={L,a,b2},lo; cv::merge(chn,3,lo);
    cv::Mat color; cvtColor(lo,color,cv::COLOR_Lab2BGR);
    cv::Mat out8; color.convertTo(out8,CV_8UC3,255.0);
    if(!cv::imwrite(output,out8)){fprintf(stderr,"write failed\n");return 1;}
    if(verbose)fprintf(stderr,"saved %s\n",output.c_str());
    return 0;
}
"""

open("colorize-src/CMakeLists.txt","w").write(cmake)
open("colorize-src/colorize_impl.cpp","w").write(impl)
open("colorize-src/main.cpp","w").write(main)
print("Sources written OK")
PYEOF

          mkdir -p colorize-build
          cmake -S colorize-src \
                -B colorize-build \
                -DCMAKE_TOOLCHAIN_FILE="$ANDROID_NDK/build/cmake/android.toolchain.cmake" \
                -DANDROID_ABI=arm64-v8a \
                -DANDROID_PLATFORM=android-21 \
                -DANDROID_STL=c++_static \
                -DCMAKE_BUILD_TYPE=Release \
                -G Ninja
          cmake --build colorize-build -j$(nproc)
          ls -lh colorize-build/colorize-ncnn
          echo "colorize-ncnn built ✓"

      - name: Copy binary and model to assets
        run: |
          ASSETS=RealSR-NCNN-Android-GUI/app/src/main/assets/realsr
          mkdir -p "$ASSETS/colorize-models"
          cp colorize-build/colorize-ncnn "$ASSETS/colorize-ncnn"
          wget -q --tries=3 \
            "https://github.com/nihui/ncnn-assets/raw/master/models/siggraph17_color_sim.param" \
            -O "$ASSETS/colorize-models/siggraph17_color_sim.param"
          wget -q --tries=3 \
            "https://github.com/nihui/ncnn-assets/raw/master/models/siggraph17_color_sim.bin" \
            -O "$ASSETS/colorize-models/siggraph17_color_sim.bin"
          ls -lh "$ASSETS/colorize-models/"
          size=$(stat -c%s "$ASSETS/colorize-models/siggraph17_color_sim.bin")
          [ "$size" -lt 1000000 ] && echo "ERROR: model too small" && exit 1
          echo "Assets ready ✓"

      - name: Setup realsr 3rdparty
        run: |
          mkdir -p 3rdparty/ncnn-android-vulkan-shared
          cp -r ncnn-20230816-android-vulkan/* 3rdparty/ncnn-android-vulkan-shared/ 2>/dev/null || true

      - name: Build APK
        run: |
          cd RealSR-NCNN-Android-GUI
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon -x test
          find . -name "*.apk" | xargs ls -lh

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: RealSR-Colorize
          path: RealSR-NCNN-Android-GUI/app/build/outputs/apk/**/*.apk

      - name: Create Release
        if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ github.run_number }}
          name: "Build #${{ github.run_number }} — RealSR + Colorize"
          files: RealSR-NCNN-Android-GUI/app/build/outputs/apk/**/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
